<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Ingeniería | Long Polling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white h-screen flex flex-col font-sans">

<div id="notifications" class="fixed top-5 right-5 z-50 flex flex-col gap-3"></div>

<header class="p-4 bg-slate-800 shadow-xl border-b border-slate-700 flex justify-between items-center">
    <div>
        <h1 class="text-xl font-bold flex items-center gap-2 text-yellow-400">
            <span class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></span>
            Arquitectura Long Polling
        </h1>
        <p class="text-slate-400 text-xs">REST API Asíncrono - UNJFSC</p>
    </div>
    <div id="status-badge" class="text-xs bg-yellow-900/30 border border-yellow-500 text-yellow-400 px-3 py-1 rounded-full transition-all">
        Iniciando...
    </div>
</header>

<main id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar"></main>

<footer class="p-6 bg-slate-800 border-t border-slate-700">
    <div class="max-w-5xl mx-auto flex flex-col md:flex-row gap-3">
        <input type="text" id="username" placeholder="Tu Nombre" class="bg-slate-700 border-none rounded-lg p-3 outline-none focus:ring-2 focus:ring-yellow-500 md:w-1/4 transition-all">
        <div class="flex-1 flex gap-2">
            <input type="text" id="message" placeholder="Escribir mensaje..." class="bg-slate-700 border-none rounded-lg p-3 flex-1 outline-none focus:ring-2 focus:ring-yellow-500 transition-all">
            <button onclick="sendMessage()" class="bg-yellow-600 hover:bg-yellow-700 px-6 py-3 rounded-lg font-bold transition-all active:scale-95 text-slate-900 shadow-lg shadow-yellow-900/20">
                Enviar
            </button>
        </div>
    </div>
</footer>

<script src="chat.js"></script>
</body>
</html>
